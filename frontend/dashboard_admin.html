<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGI-RDC | Administration</title>
    <link rel="stylesheet" href="dashboard_client.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="logo desktop-logo">
                <h2>KARGO MARKETING</h2>
                <span class="subtitle">Consulting</span>
            </div>
            <ul role="menu">
                <li class="active" role="menuitem"><i class="fas fa-tray-full"></i> Incoming Requests</li>
                <li role="menuitem"><i class="fas fa-file-invoice-dollar"></i> Pending Payments</li>
            </ul>
            <div class="logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="fas fa-bars menu-trigger icon-btn" id="menu-trigger"></button>
                    <div class="search-wrap">
                        <i class="fas fa-search"></i>
                        <input type="text" id="adminSearch" placeholder="Search BL or Client...">
                    </div>
                </div>
                <div class="header-right">
                    <button class="far fa-bell icon-btn"></button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="name">Admin Michael</span>
                            <span class="role">Administrator</span>
                        </div>
                        <div class="avatar-placeholder"
                            style="width:36px; height:36px; background:var(--primary-orange); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">
                            AM</div>
                    </div>
                </div>
            </header>

            <section class="action-bar">
                <div class="actions-left">
                    <h3 style="margin:0; color:var(--text-dark);">FERI / AD Queue</h3>
                </div>
                <div class="actions-right">
                    <button class="btn-white" onclick="location.reload()"><i class="fas fa-sync-alt"></i>
                        Refresh</button>
                </div>
            </section>

            <div class="table-responsive">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>BL Number</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Client Docs</th>
                            <th>Admin Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Process File: <span id="target-bl-display" class="text-blue"></span></h3>
            </div>
            <div class="modal-body">
                <label id="main-label">Proforma Amount ($)</label>
                <input type="text" id="admin-amount" class="input-ref" placeholder="e.g. 450.00">

                <div class="upload-group">
                    <p class="sub-text">Attach PDF document for client:</p>
                    <label class="doc-upload-btn" for="admin-file-draft" id="upload-btn-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="label-draft">Click to attach PDF</span>
                        <input type="file" id="admin-file-draft" hidden accept=".pdf">
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeAdminModal()">Cancel</button>
                <button id="admin-submit-btn" class="btn-green" style="border:none;">SUBMIT TO CLIENT</button>
            </div>
        </div>
    </div>

    <script src="dashboard_admin.js"></script>
</body>

</html>
